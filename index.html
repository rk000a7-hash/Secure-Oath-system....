<!DOCTYPE html>
<html>
<head>
  <title>Secure Auth System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="box">
  <h2>Login System</h2>

  <input type="email" id="email" placeholder="Enter Gmail">
  <button onclick="sendEmailOTP()">Send Gmail OTP</button>

  <input type="text" id="emailOtp" placeholder="Enter Gmail OTP">
  <button onclick="verifyEmailOTP()">Verify Gmail OTP</button>

  <hr>

  <input type="text" id="phone" placeholder="+91XXXXXXXXXX">
  <button onclick="sendOTP()">Send Phone OTP</button>

  <input type="text" id="otp" placeholder="Enter Phone OTP">
  <button onclick="verifyOTP()">Verify Phone OTP</button>

  <hr>

  <button onclick="googleLogin()">Login with Google</button>

  <div id="recaptcha-container"></div>
  <p id="msg"></p>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
